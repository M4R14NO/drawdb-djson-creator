services:
  drawdb:
    image: node:20-alpine
    container_name: drawdb
    ports:
      - 5173:5173
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - default

  backend:
    build: ./backend
    container_name: drawdb-backend
    ports:
      - "8000:8000"
    networks:
      - default

networks:
  default:
    driver: bridge